<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Boilerplate</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* DARK THEME VARIABLES */
        :root {
            --bg: #121212;
            --text: #e0e0e0;
            --accent: #4f46e5;
        }

        /* BASE STYLES */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 20px;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
        .hide{
            display: none;
            transition: .5s;
        }
        li{
            list-style: none;
            ul{
                list-style: none;
            }
        }
        ul{
            overflow: hidden;
            background-color: #f71515;
            padding: 20px;
        }
        .a{
            width: 80%;
            height: 500px;
            background-color: #4f46e5;
        }
        .b{
             width: 80%;
            height: 400px;
            background-color:aqua;
        }
        .c{
             width: 80%;
            height: 300px;
            background-color:bisque;
        }
    </style>
</head>

<body>


    <!-- <div class="lines">
        <ul>
            <li>.</li>
            <li>..</li>
            <li>...</li>
        </ul>
    </div> -->

    <div class="event-cap">
        <div class="a">
            <div class="b">
                <div class="c">
                    <button>Click Me</button>
                </div>
            </div>

        </div>

    </div>


    <script>
        let btn = document.querySelector("button");

        let c = document.querySelector(".c");
        
        window.addEventListener("mousemove", function(dets){
            btn.style.position = "absolute";
            btn.style.top = dets.clientY + "px";
            btn.style.left = dets.clientX + "px";
        })


        btn.addEventListener("click", function(){
            console.log("Button Clicked");
        })

        c.addEventListener("click", function(){
            console.log("c clicked");
        })



        // Events capture


    </script>
    </body>
    </html>
