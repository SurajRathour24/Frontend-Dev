    :root {
      --bg: #121212;
      --text: #e0e0e0;
      --accent: #4f46e5;
    }

    /* BASE STYLES */
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 20px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
