<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Boilerplate</title>

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* DARK THEME VARIABLES */
    :root {
      --bg: #121212;
      --text: #e0e0e0;
      --accent: #4f46e5;
    }

    /* BASE STYLES */
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 20px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<h1>Control Flow </h1>

<script>

    switch (4){
        case 1:
            console.log("NO");
            break

        case 2:
            console.log("Second");
            break;

        case 4:
            console.log("4 Getting Now");
            break;
            
    }

    function getVal(val){
        if(val > 50) { return "A";}
        else if (val < 70) { return "B";}
        else if (val> 85) { return "A+";}
    }

    // Write code for Rock Paper scissor 
    

    function playGame(user, computer){
      if(user === "paper" && computer === "scissor") return "Computer Win";
      else if(user === "scissor" && computer === "paper") return "User Win";
      else return "Draw";
    }

    let winner = playGame("scissor",  "scissor");
    console.log(winner);
    


</script>   

</body>
</html>
