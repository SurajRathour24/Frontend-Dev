<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dark Boilerplate</title>

    <style>
      /* RESET */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* DARK THEME VARIABLES */
      :root {
        --bg: #121212;
        --text: #e0e0e0;
        --accent: #4f46e5;
      }

      /* BASE STYLES */
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        padding: 20px;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <h1>Objects in JS</h1>


    <script>
        console.log("abc");

        let myObject = {
            name: "Harsh",
            organisation: "GreyStar",
            designation: "FrontEnd - Developer",
            Experience: {
                Autb: 2024,
                myExp: 2025,
                markInfo: 2026
            },
            techs: ["HTML", "CSS", "JS", "React JS", "Tailwind CSS", "Bootstrap", "Figma", "WordPress", "Webflow"] 
        }

        // console.log(myObject.Experience.markInfo);

        console.log(myObject.techs.forEach(function(tech){
                // console.log("Familier with", tech);
        }));
        

        // Copy the object with spread opr

        let user2 = {...myObject};

        console.log(user2)
        
        user2["name"] = "Suraj";
        
        console.log(user2)

        
    </script>
  </body>
</html>
