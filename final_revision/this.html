<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Boilerplate</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* DARK THEME VARIABLES */
        :root {
            --bg: #121212;
            --text: #e0e0e0;
            --accent: #4f46e5;
        }

        /* BASE STYLES */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 20px;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .hide {
            display: none;
            transition: .5s;
        }

        li {
            list-style: none;

            ul {
                list-style: none;
            }
        }

   

        .a {
            width: 80%;
            height: 500px;
            background-color: #4f46e5;
        }

        .b {
            width: 80%;
            height: 400px;
            background-color: aqua;
        }

        .c {
            width: 80%;
            height: 300px;
            background-color: bisque;
        }

        input {
            height: 45px;
            padding: 10px;
            margin: 20px 0px;
            width: 300px;
        }

        .wrapper {
            background-color: azure;
            width: 200px;
            border-radius: 20px;
            position: relative;
        }

        span {
            color: #000;
            padding: 0px 10px;
            position: relative;
            z-index: 999;
        }

        .wrapper::before {
            position: absolute;
            width: 5%;
            background-color: rgb(255, 149, 117);
            left: 0px;
            top: 0;
            height: 100%;
            content: "";
            border-radius: 20px;
        }
    </style>
</head>

<body>

</body>
</html>
