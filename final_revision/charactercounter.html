<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Boilerplate</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* DARK THEME VARIABLES */
        :root {
            --bg: #121212;
            --text: #e0e0e0;
            --accent: #4f46e5;
        }

        /* BASE STYLES */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 20px;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
        .hide{
            display: none;
            transition: .5s;
        }
        li{
            list-style: none;
            ul{
                list-style: none;
            }
        }
        ul{
            overflow: hidden;
            background-color: #f71515;
            padding: 20px;
        }
        .a{
            width: 80%;
            height: 500px;
            background-color: #4f46e5;
        }
        .b{
             width: 80%;
            height: 400px;
            background-color:aqua;
        }
        .c{
             width: 80%;
            height: 300px;
            background-color:bisque;
        }
        input{
            height: 45px;
            padding: 10px;
            margin: 20px 0px;
            width: 300px;
        }
        
    </style>
</head>

<body>

    <h1>Live Character Counter</h1>

    <input type="text" placeholder="Type Something...">

    <h2>Total Characters Are: <span>0</span></h2> 



    <script>
        let inp = document.querySelector("input");
        let counterText = document.querySelector("h2");
        let counterNum = document.querySelector("span");

        inp.addEventListener("input", function(dets){
            console.log(inp.value.length);
            counterNum.textContent = inp.value.length;
        })
    </script>
    </body>
    </html>
