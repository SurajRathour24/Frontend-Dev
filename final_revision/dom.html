<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Boilerplate</title>

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* DARK THEME VARIABLES */
    :root {
      --bg: #121212;
      --text: #e0e0e0;
      --accent: #4f46e5;
    }

    /* BASE STYLES */
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 20px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>


    <h1>Heading </h1>


    <ul>
        <li>ABC</li>
        <li>EFG</li>
        <li>HIG</li>
    </ul>



    <script>
        let heading = document.querySelector("h1");

        let list = document.querySelectorAll("ul");
        console.log(list);
        
        heading.setAttribute("href", "#");

        let newElem = document.createElement("p");
        newElem.textContent = "Got it—here’s clean, professional dummy content you can directly paste into your dermatology service page (left content area). It’s written to feel premium but still realistic for a clinic like yours."

        newElem.style.fontSize = "12px";
        newElem.style.fontWeight = "400";

        heading.appendChild(newElem);

    </script>
    </body>
    </html>
