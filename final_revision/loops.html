<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Boilerplate</title>

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* DARK THEME VARIABLES */
    :root {
      --bg: #121212;
      --text: #e0e0e0;
      --accent: #4f46e5;
    }

    /* BASE STYLES */
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 20px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<h1> Loops in JS </h1>

<script>

//    For Loop

for(let i = 0; i<10; i++){
    console.log(i);
}

//  While 

let num = 5;
while(num<10){
    console.log(num);
    num++;
}

// Do while

let val = 10;

do{
    console.log(val);
    val++;
}
while(val<10);

</script>   

</body>
</html>
