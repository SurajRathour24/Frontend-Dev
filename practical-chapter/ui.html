<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pattern Generator</title>
  <style>
    body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #1e293b;
  padding: 30px;
  border-radius: 12px;
  width: 400px;
  text-align: center;
}

h1 {
  margin-bottom: 20px;
}

.controls {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

input, select, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #38bdf8;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  opacity: 0.8;
}

pre {
  margin-top: 20px;
  background: #020617;
  padding: 15px;
  border-radius: 8px;
  text-align: left;
}
  </style>
</head>
<body>

<div class="container">
  <h1>Pattern Generator</h1>

  <div class="controls">
    <input type="number" id="rows" placeholder="Enter number of rows" />

    <select id="patternType">
      <option value="triangle">Star Triangle</option>
      <option value="number">Number Triangle</option>
      <option value="floyd">Floyd's Triangle</option>
      <option value="pyramid">Number Pyramid</option>
    </select>

    <button onclick="generatePattern()">Generate</button>
  </div>

  <pre id="output"></pre>
</div>

<script src="script.js"></script>
</body>
</html>
