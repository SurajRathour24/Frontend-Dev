<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Storage Practice</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
    input, button {
      margin: 5px;
      padding: 8px;
    }
  </style>
</head>
<body>

  <h2>Storage Practice (Local, Session, Cookies)</h2>

  <!-- Input -->
  <input type="text" id="inputValue" placeholder="Enter something">
  
  <!-- Local Storage -->
  <h3>Local Storage</h3>
  <button onclick="saveLocal()">Save</button>
  <button onclick="getLocal()">Get</button>
  <button onclick="removeLocal()">Remove</button>

  <!-- Session Storage -->
  <h3>Session Storage</h3>
  <button onclick="saveSession()">Save</button>
  <button onclick="getSession()">Get</button>
  <button onclick="removeSession()">Remove</button>

  <!-- Cookies -->
  <h3>Cookies</h3>
  <button onclick="setCookie()">Set Cookie</button>
  <button onclick="getCookie()">Get Cookie</button>
  <button onclick="deleteCookie()">Delete Cookie</button>

  <h3>Output:</h3>
  <p id="output"></p>

  <script>
    let input = document.getElementById("inputValue");
    let output = document.getElementById("output");

    // ======================
    // LOCAL STORAGE
    // ======================
    function saveLocal() {
      localStorage.setItem("myData", input.value);
      alert("Saved in LocalStorage");
    }

    function getLocal() {
      let data = localStorage.getItem("myData");
      output.innerText = "LocalStorage: " + data;
    }

    function removeLocal() {
      localStorage.removeItem("myData");
      alert("Removed from LocalStorage");
    }
 // ======================
    // SESSION STORAGE
    // ======================

    function saveSession() {
      sessionStorage.setItem("myData", input.value);
      alert("Saved in SessionStorage");
    }

    function getSession() {
      let data = sessionStorage.getItem("myData");
      output.innerText = "SessionStorage: " + data;
    }

    function removeSession() {
      sessionStorage.removeItem("myData");
      alert("Removed from SessionStorage");
    }

    // ======================
    // COOKIES
    // ======================
    
    function setCookie() {
      document.cookie = "myData=" + input.value + "; path=/; max-age=3600";
      alert("Cookie Set");
    }

    function getCookie() {
      let cookies = document.cookie.split("; ");
      let value = "Not Found";

      cookies.forEach(c => {
        let [key, val] = c.split("=");
        if (key === "myData") {
          value = val;
        }
      });

      output.innerText = "Cookie: " + value;
    }

    function deleteCookie() {
      document.cookie = "myData=; path=/; max-age=0";
      alert("Cookie Deleted");
    }
  </script>

</body>
</html>
