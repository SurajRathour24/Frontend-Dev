<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS Events Practice</title>
  <style>
    body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: #f4f4f4;
}

h1 {
  text-align: center;
}

.red{
    background-color: #fcc03d;
}
section {
  background: #fff;
  padding: 20px;
  margin: 20px 0;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

button {
  padding: 10px 15px;
  margin: 5px;
  cursor: pointer;
}

#hoverBox {
  width: 200px;
  height: 100px;
  background: #3498db;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 10px;
}

input, select {
  padding: 8px;
  margin-top: 10px;
}
li{
  cursor: pointer;
}
.strk{
  text-decoration: line-through;
}
  </style>
</head>
<body>

  <h1>JavaScript Events Practice Area</h1>

  <!-- Click Events -->
  <section>
    <h2>Click Events</h2>
    <button id="clickBtn">Click Me</button>
    <button id="dblClickBtn">Double Click Me</button>
  </section>

  <!-- Mouse Events -->
  <section>
    <h2>Mouse Events</h2>
    <div id="hoverBox">Hover Over Me</div>
  </section>

  <!-- Keyboard Events -->
  <section>
    <h2>Keyboard Events</h2>
    <input type="text" id="keyInput" placeholder="Type something...">
  </section>

  <!-- Form Events -->
  <section>
    <h2>Form Events</h2>
    <form id="myForm">
      <input id="userName" type="text" placeholder="Your Name" required>
      <button type="submit">Submit</button>
    </form>
  </section>

  <!-- Focus & Blur -->
  <section>
    <h2>Focus / Blur</h2>
    <input type="text" id="focusInput" placeholder="Click here">
  </section>

  <!-- Change Event -->
  <section>
    <h2>Change Event</h2>
    <select id="dropdown">
      <option value="">Select</option>
      <option value="HTML">HTML</option>
      <option value="CSS">CSS</option>
      <option value="JS">JavaScript</option>
    </select>
  </section>


  <!-- Scroll Event -->
  <section style="height: 800px;">
    <h2>Scroll Down</h2>
  </section>



  <section class="users-list">
    <ul>
      <li>Aman</li>
      <li>Shubham</li>
      <li>Kartik</li>
      <li>Vikrant</li>
      <li>Rahul</li>
    </ul>
  </section>

  <script>

    let usersList = document.querySelector("ul");

    usersList.addEventListener("click", function(dets){
      dets.target.classList.toggle("strk");
    })

    let clickBtn = document.querySelector("#clickBtn");
    clickBtn.addEventListener("click", function(e){
        // console.log(e);
       this.classList.toggle("red");
        
    })

    let dblClick = document.querySelector("#dblClickBtn");

    dblClick.addEventListener("dblclick", function(db){
        // console.log(this);
        
    })

    let hoverBox = document.querySelector("#hoverBox");
    hoverBox.addEventListener("mouseover", function(e){
        // console.log(e);
        this.style.background = "red";
    })

    let keyBoard = document.querySelector("#keyInput");
    keyBoard.addEventListener("keydown", function(e){
        // console.log(e.key);
        
    })

    let formData = document.querySelector("form")

    formData.addEventListener("submit", function(e){
        console.log(e);
        e.preventDefault();
        let userName = document.querySelector("#userName");
        userName.addEventListener("input", function(e){
          console.log(e);
        })
    })
  </script>
</body>
</html>
